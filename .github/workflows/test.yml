name: Test & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install numpy pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/ \
            --ignore=tests/e2e \
            --cov=v2.feature_flags \
            --cov=v2.ab_test \
            --cov=v2.event_logger \
            --cov-fail-under=80 \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

      - name: Coverage summary
        run: |
          python -m pytest tests/ --ignore=tests/e2e \
            --cov=v2.feature_flags --cov=v2.ab_test --cov=v2.event_logger \
            --cov-report=term-missing -q 2>&1 | tail -10 >> $GITHUB_STEP_SUMMARY

  e2e-test:
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install numpy pytest pytest-playwright jinja2
          playwright install chromium --with-deps

      - name: Generate dashboard for E2E test
        run: |
          python metrics/compute_dora.py \
            --input metrics/session_events.csv \
            --out metrics/out

      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        run: |
          python -m pytest tests/e2e/ -v \
            --screenshot=only-on-failure \
            --output=test-artifacts

      - name: Upload screenshot artifacts on failure
        if: steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-screenshots
          path: |
            test-artifacts/screenshots/
            test-artifacts/
          if-no-files-found: ignore

      - name: Fail if E2E failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1
