name: GitHub Pages Deploy

on:
  push:
    branches: [main]
    paths:
      - "metrics/**"
      - ".github/workflows/pages.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "metrics/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  # ── main 브랜치 push → GitHub Pages 본 배포 ──────────────────────────────
  deploy-pages:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate dashboard
        run: |
          pip install -q jinja2
          python metrics/compute_dora.py \
            --input metrics/session_events.csv \
            --out metrics/out

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp metrics/out/dashboard.html _site/index.html
          cp metrics/out/dashboard.png  _site/dashboard.png 2>/dev/null || true
          cp metrics/out/metrics.json   _site/metrics.json  2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

  # ── PR → 프리뷰 배포 (gh-pages 브랜치의 pr-{번호}/ 하위 경로) ────────────
  pr-preview:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate dashboard for PR
        run: |
          pip install -q jinja2
          python metrics/compute_dora.py \
            --input metrics/session_events.csv \
            --out metrics/out

      - name: Deploy PR preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: metrics/out
          destination_dir: pr-${{ github.event.number }}
          keep_files: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const repo = context.repo;
            const previewUrl =
              `https://${repo.owner}.github.io/${repo.repo}/pr-${pr}/dashboard.html`;

            const { data: comments } = await github.rest.issues.listComments({
              ...repo,
              issue_number: pr,
            });

            const botComment = comments.find(c =>
              c.user.login === "github-actions[bot]" &&
              c.body.includes("PR Preview")
            );

            const body = [
              "## PR Preview",
              "",
              `DORA 메트릭 대시보드 프리뷰: [dashboard.html](${previewUrl})`,
              "",
              `> 커밋: \`${context.sha.slice(0, 7)}\``,
            ].join("\n");

            if (botComment) {
              await github.rest.issues.updateComment({
                ...repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: pr,
                body,
              });
            }

  # ── PR 닫힘 → 프리뷰 정리 ────────────────────────────────────────────────
  pr-preview-cleanup:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v7
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        run: |
          PR_DIR="pr-${{ github.event.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "chore: remove preview for PR #${{ github.event.number }}"
            git push
          else
            echo "No preview directory found, skipping."
          fi
