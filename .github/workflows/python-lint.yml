name: Optimized CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  matrix-run:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      os: ubuntu-latest
      python-version: '3.10'
      use-cache: true
      run-tests: true
      artifact-prefix: with-cache

  matrix-run-no-cache:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      os: ubuntu-latest
      python-version: '3.10'
      use-cache: false
      run-tests: true
      artifact-prefix: no-cache
    needs: matrix-run

  conditional-deploy:
    needs: [matrix-run, matrix-run-no-cache]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[deploy]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (mock)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Conditional deploy triggered."
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "No deploy token configured; aborting deploy."
            exit 1
          fi
          echo "Deploy successful."
