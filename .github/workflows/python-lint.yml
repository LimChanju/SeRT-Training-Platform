name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest

    - name: Run Flake8 Linting
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude v1 --filename "*.py"
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude v1 --filename "*.py"

    - name: Run Tests (Mock)
      run: |
        echo "Running tests..."
        echo "Test completed successfully on ${{ matrix.os }} with Python ${{ matrix.python-version }}" > test_report_${{ matrix.os }}_${{ matrix.python-version }}.txt

    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: test-report-${{ matrix.os }}-${{ matrix.python-version }}
        path: test_report_${{ matrix.os }}_${{ matrix.python-version }}.txt

  deploy:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Test Reports
      uses: actions/download-artifact@v4
      with:
        path: downloaded-reports

    - name: Display downloaded artifacts
      run: ls -la downloaded-reports/* || true

    - name: Deploy application
      env:
        DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
      run: |
        echo "Deploying application..."
        if [ -z "$DEPLOY_TOKEN" ]; then
          echo "Warning: DEPLOY_TOKEN secret is not configured in repository settings."
        else
          echo "Token safely injected and masked!"
        fi
        echo "Deployment Successful!"
