name: Docker Build and Push

on:
  push:
    branches: [main]
    paths:
      - "v2/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: docker pull ghcr.io/${{ github.repository }}:latest

      - name: Smoke test — package import
        run: |
          docker run --rm \
            ghcr.io/${{ github.repository }}:latest \
            python -c "from v2 import __version__; print('version:', __version__)"

      - name: Smoke test — event_logger import
        run: |
          docker run --rm \
            ghcr.io/${{ github.repository }}:latest \
            python -c "from v2.event_logger import EventLogger; print('EventLogger OK')"

      - name: Smoke test — app_config import
        run: |
          docker run --rm \
            ghcr.io/${{ github.repository }}:latest \
            python -c "from v2.app_config import BASE_DIR; print('BASE_DIR:', BASE_DIR)"

      - name: Report image digest
        run: |
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | ghcr.io/${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | ${{ needs.build-and-push.outputs.digest }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 스모크 테스트 | 통과 |" >> $GITHUB_STEP_SUMMARY
