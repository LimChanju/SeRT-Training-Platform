name: Weekly Experiment Report

on:
  schedule:
    - cron: "0 1 * * 1"  # 매주 월요일 오전 10시 (KST)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install numpy

      - name: Run A/B experiment report
        run: python scripts/run_ab_experiment.py

      - name: Run persona feedback
        run: python scripts/generate_persona_feedback.py

      - name: Upload experiment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-experiment-data
          path: |
            data/ab_experiment/
            data/persona_feedback/

      - name: Create weekly report issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const today = new Date().toISOString().slice(0, 10);

            let abSummary = "데이터 없음";
            try {
              const report = JSON.parse(
                fs.readFileSync("data/ab_experiment/ab_report.json", "utf8")
              );
              const a = report.overall.A;
              const b = report.overall.B;
              abSummary = [
                `| 지표 | Variant A | Variant B |`,
                `|------|-----------|-----------|`,
                `| 평균 완료 시간 | ${a.avg_duration_sec}초 | ${b.avg_duration_sec}초 |`,
                `| 평균 충돌 횟수 | ${a.avg_collisions}회 | ${b.avg_collisions}회 |`,
                `| 성공률 | ${(a.success_rate*100).toFixed(1)}% | ${(b.success_rate*100).toFixed(1)}% |`,
                `| **우세 variant** | **${report.conclusion.winner}** | |`,
              ].join("\n");
            } catch (e) {}

            let feedbackSummary = "데이터 없음";
            try {
              const feedback = JSON.parse(
                fs.readFileSync("data/persona_feedback/feedback_results.json", "utf8")
              );
              const avg = feedback.reduce((s, f) => s + f.score, 0) / feedback.length;
              const wouldUse = feedback.filter(f => f.would_use).length;
              feedbackSummary = `평균 만족도: **${avg.toFixed(1)}/5.0** | 사용 의향: **${wouldUse}/${feedback.length}명**`;
            } catch (e) {}

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Weekly Report] A/B 실험 주간 리포트 (${today})`,
              body: [
                "## 주간 실험 리포트",
                "",
                `생성일: ${today}`,
                "",
                "### A/B 테스트 지표",
                "",
                abSummary,
                "",
                "### 사용자 피드백 요약",
                "",
                feedbackSummary,
                "",
                "### 참고 문서",
                "- [Pivot/Persevere 결정 문서](docs/pivot-decision.md)",
                "- [실험 데이터](data/ab_experiment/)",
                "- [페르소나 피드백](data/persona_feedback/)",
              ].join("\n"),
              labels: ["experiment", "weekly-report"],
            });
